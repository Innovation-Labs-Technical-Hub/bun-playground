apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: bun-playground
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: bun-playground
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

      resource:
        attributes:
          - key: deployment.environment
            value: "development"
            action: upsert

    exporters:
      loki:
        endpoint: http://loki:3100/loki/api/v1/push

      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

      debug:
        verbosity: basic

    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [loki, debug]
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp/tempo, debug]
