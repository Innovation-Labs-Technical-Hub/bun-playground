apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: bun-playground
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: bun-playground
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: http
      port: 4318
      targetPort: 4318
      protocol: TCP
